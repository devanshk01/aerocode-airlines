# ============================================
# AeroCode Airlines – MySQL Production Profile
# ============================================
# Activate with: mvn spring-boot:run -Dspring-boot.run.profiles=mysql
# Or set: SPRING_PROFILES_ACTIVE=mysql

spring.datasource.url=jdbc:mysql://localhost:3306/aerocode_airlines?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=your_password_here

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 console in production
spring.h2.console.enabled=false

# Enable Thymeleaf caching in production
spring.thymeleaf.cache=true
