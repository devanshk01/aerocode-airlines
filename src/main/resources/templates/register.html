<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign Up')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="auth-page">
    <div class="auth-card animate-fade-in" style="max-width: 540px;">
        <div style="text-align: center; margin-bottom: 8px; font-size: 2.5rem;">✈</div>
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join AeroCode Airlines and start booking flights today</p>

        <div th:if="${errorMessage}" class="alert alert-danger">
            ⚠ <span th:text="${errorMessage}">Error</span>
        </div>

        <form th:action="@{/register}" method="post">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" class="form-control"
                           placeholder="John Doe" required th:value="${fullName}">
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control"
                           placeholder="johndoe" required th:value="${username}">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="john@example.com" required th:value="${email}">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                           placeholder="Re-enter password" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" class="form-control"
                           placeholder="25" required min="18" max="120">
                </div>
                <div class="form-group">
                    <label for="mobileNum">Mobile Number</label>
                    <input type="number" id="mobileNum" name="mobileNum" class="form-control"
                           placeholder="9876543210" required>
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" class="form-control" required>
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full btn-lg mt-2">Create Account</button>
        </form>

        <p class="text-center mt-3" style="color: var(--gray-500); font-size: 0.9rem;">
            Already have an account? <a th:href="@{/login}" style="font-weight: 600;">Log In</a>
        </p>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
