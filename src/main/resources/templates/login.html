<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Log In')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="auth-page">
    <div class="auth-card animate-fade-in">
        <div style="text-align: center; margin-bottom: 8px; font-size: 2.5rem;">✈</div>
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Log in to manage your flights and bookings</p>

        <div th:if="${errorMessage}" class="alert alert-danger">
            ⚠ <span th:text="${errorMessage}">Error</span>
        </div>
        <div th:if="${successMessage}" class="alert alert-success">
            ✓ <span th:text="${successMessage}">Success</span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-full btn-lg mt-2">Log In</button>
        </form>

        <p class="text-center mt-3" style="color: var(--gray-500); font-size: 0.9rem;">
            Don't have an account? <a th:href="@{/register}" style="font-weight: 600;">Sign Up</a>
        </p>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
